<script>/* PWA-Shim: macht die Original-Artifact-Apps auf GitHub Pages lauffähig */
(function () {
  "use strict";
  /* 1) window.storage (Artifact-API) -> localStorage */
  var P = "artifact-storage:";
  window.storage = {
    get: async function (key) {
      var v = localStorage.getItem(P + key);
      if (v === null) return null;
      return { key: key, value: v, shared: false };
    },
    set: async function (key, value) {
      localStorage.setItem(P + key, String(value));
      return { key: key, value: String(value), shared: false };
    },
    delete: async function (key) {
      localStorage.removeItem(P + key);
      return { key: key, deleted: true, shared: false };
    },
    list: async function (prefix) {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf(P) === 0) {
          var real = k.slice(P.length);
          if (!prefix || real.indexOf(prefix) === 0) keys.push(real);
        }
      }
      return { keys: keys, prefix: prefix, shared: false };
    },
  };

  /* 2) Anthropic-API: eigenen Key anhängen (im Artifact auf claude.ai unnötig,
        auf GitHub Pages Pflicht). Key wird einmal abgefragt, bleibt im
        localStorage DIESES Geräts, landet nie im Repo. */
  var _fetch = (window.fetch || function () { return Promise.reject(new Error("no fetch")); }).bind(window);
  window.fetch = function (url, opts) {
    try {
      var u = typeof url === "string" ? url : (url && url.url) || "";
      if (u.indexOf("https://api.anthropic.com") === 0) {
        opts = opts || {};
        var h = new Headers(opts.headers || {});
        var key = localStorage.getItem("anthropic_key") || "";
        if (!key) {
          key = (window.prompt(
            "Für die KI-Funktion wird ein Anthropic API-Key benötigt " +
            "(console.anthropic.com \u2192 API Keys).\n" +
            "Er wird nur lokal auf diesem Gerät gespeichert:"
          ) || "").trim();
          if (key) localStorage.setItem("anthropic_key", key);
        }
        if (key) h.set("x-api-key", key);
        if (!h.has("anthropic-version")) h.set("anthropic-version", "2023-06-01");
        h.set("anthropic-dangerous-direct-browser-access", "true");
        opts.headers = h;
      }
    } catch (e) { /* im Zweifel Original-Fetch */ }
    return _fetch(url, opts);
  };

  /* 3) Service Worker für Offline-Betrieb */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();

@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --paper: #E9E7DE;
  --card: #F5F4EE;
  --ink: #1C2A38;
  --blau: #3A5C80;
  --blau-dark: #27415C;
  --line: #C6C2B4;
  --muted: #6E7880;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

.app {
  min-height: 100vh;
  background: var(--paper);
  background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(58,92,128,0.05) 27px, rgba(58,92,128,0.05) 28px);
  color: var(--ink);
  font-family: 'Barlow', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 32px;
}

.head, .nav, .main, .foot { width: 100%; max-width: 560px; }

/* ---------- Header ---------- */
.head {
  padding: 28px 0 18px;
  border-bottom: 3px double var(--blau);
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: flex-end;
  justify-content: space-between;
}

.eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--blau);
}

.head h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 30px;
  line-height: 1.05;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--ink);
  margin-top: 4px;
}

.head h1 .model { color: var(--blau); }

/* ---------- Odometer ---------- */
.odo {
  display: inline-flex;
  align-items: baseline;
  gap: 2px;
  padding: 6px;
  background: var(--blau-dark);
  border-radius: 4px;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}

.odo-cell {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 20px;
  line-height: 1;
  color: #F2F0E8;
  background: #14202E;
  border-radius: 2px;
  padding: 5px 4px;
  min-width: 20px;
  text-align: center;
}

.odo-unit {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #9FB4C8;
  padding: 0 4px;
  align-self: flex-end;
}

/* ---------- Nav ---------- */
.nav {
  display: flex;
  gap: 8px;
  padding: 14px 0;
}

.nav-tab {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--line);
  color: var(--muted);
  padding: 8px 16px;
  border-radius: 3px;
  cursor: pointer;
}

.nav-on {
  border-color: var(--blau);
  color: var(--blau);
  background: var(--card);
}

.nav-add {
  margin-left: auto;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--blau);
  color: #F5F4EE;
  border: 1px solid var(--blau);
  padding: 8px 16px;
  border-radius: 3px;
  cursor: pointer;
}

.nav-add:hover, .btn-primary:hover { background: var(--blau-dark); }

button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--blau);
  outline-offset: 2px;
}

/* ---------- Log / Stampfelder ---------- */
.log section { margin-bottom: 8px; }

.year-rule {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 14px 2px 8px;
}

.year-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 0.12em;
  color: var(--blau);
}

.year-sum {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.stamp {
  display: block;
  width: 100%;
  text-align: left;
  background: var(--card);
  border: 1px solid var(--blau);
  outline: 1px solid var(--blau);
  outline-offset: -4px;
  border-radius: 2px;
  padding: 12px 14px;
  margin-bottom: 10px;
  cursor: pointer;
  font-family: 'Barlow', sans-serif;
  color: var(--ink);
  transition: transform 0.08s ease;
}

.stamp:active { transform: scale(0.995); }

.stamp-top {
  display: flex;
  justify-content: space-between;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

.stamp-title {
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 8px;
}

.stamp-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stamp-cat {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--blau);
  border: 1px solid var(--blau);
  border-radius: 2px;
  padding: 2px 8px;
}

.stamp-cost {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 14px;
}

.stamp-notes {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--line);
  font-size: 13px;
  color: var(--muted);
}

/* ---------- Empty state ---------- */
.empty {
  text-align: center;
  padding: 56px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.empty-stamp {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-size: 13px;
  color: var(--line);
  border: 2px dashed var(--line);
  border-radius: 2px;
  padding: 18px 36px;
  transform: rotate(-2deg);
  margin-bottom: 8px;
}

.empty p { font-size: 15px; }
.empty-sub { color: var(--muted); font-size: 13px !important; }

/* ---------- Form ---------- */
.form {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 18px 16px;
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.field { display: flex; flex-direction: column; gap: 6px; flex: 1; }

.field > span {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.field input, .field textarea {
  font-family: 'Barlow', sans-serif;
  font-size: 16px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 3px;
  background: #FDFCF9;
  color: var(--ink);
}

.field-row { display: flex; gap: 12px; }

.chips { display: flex; flex-wrap: wrap; gap: 6px; }

.chip {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--line);
  background: none;
  color: var(--muted);
  padding: 6px 12px;
  border-radius: 2px;
  cursor: pointer;
}

.chip-on {
  border-color: var(--blau);
  background: var(--blau);
  color: #F5F4EE;
}

.form-actions { display: flex; gap: 10px; margin-top: 4px; }

.btn-primary {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--blau);
  color: #F5F4EE;
  border: none;
  padding: 12px 22px;
  border-radius: 3px;
  cursor: pointer;
}

.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-ghost {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--line);
  color: var(--muted);
  padding: 12px 18px;
  border-radius: 3px;
  cursor: pointer;
}

.danger-zone { border-top: 1px dashed var(--line); padding-top: 12px; }

.btn-danger-ghost {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none;
  border: none;
  color: #A33B2E;
  cursor: pointer;
  padding: 4px 0;
}

.btn-danger {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: #A33B2E;
  color: #F5F4EE;
  border: none;
  padding: 8px 14px;
  border-radius: 3px;
  cursor: pointer;
}

.confirm-row { display: flex; align-items: center; gap: 10px; font-size: 14px; }

/* ---------- Stats ---------- */
.stats { margin-top: 14px; display: flex; flex-direction: column; gap: 22px; }

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-box {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.stat-value {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 20px;
  color: var(--ink);
}

.stat-section { display: flex; flex-direction: column; gap: 10px; }

.bar-row {
  display: grid;
  grid-template-columns: 90px 1fr 80px;
  align-items: center;
  gap: 10px;
}

.bar-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink);
}

.bar-track {
  height: 14px;
  background: rgba(58,92,128,0.12);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill { height: 100%; background: var(--blau); }

.bar-value {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  text-align: right;
  color: var(--muted);
}

.year-stat-row {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px dashed var(--line);
  padding-bottom: 6px;
}

.stats-empty, .loading {
  padding: 48px 16px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}

/* ---------- Footer ---------- */
.foot {
  margin-top: auto;
  padding-top: 28px;
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

@media (max-width: 420px) {
  .head h1 { font-size: 24px; }
  .odo-cell { font-size: 16px; min-width: 17px; }
  .field-row { flex-direction: column; }
  .bar-row { grid-template-columns: 76px 1fr 74px; }
}

@media (prefers-reduced-motion: reduce) {
  .stamp { transition: none; }
}
