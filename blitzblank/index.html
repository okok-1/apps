<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Blitzblank</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Blitzblank">
<meta name="theme-color" content="#26221B">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>html,body{margin:0;padding:0;background:#FDFCF7}body{padding-top:env(safe-area-inset-top)}#root{min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script>/* PWA-Shim: macht die Original-Artifact-Apps auf GitHub Pages lauffähig */
(function () {
  "use strict";
  /* 1) window.storage (Artifact-API) -> localStorage */
  var P = "artifact-storage:";
  window.storage = {
    get: async function (key) {
      var v = localStorage.getItem(P + key);
      if (v === null) return null;
      return { key: key, value: v, shared: false };
    },
    set: async function (key, value) {
      localStorage.setItem(P + key, String(value));
      return { key: key, value: String(value), shared: false };
    },
    delete: async function (key) {
      localStorage.removeItem(P + key);
      return { key: key, deleted: true, shared: false };
    },
    list: async function (prefix) {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf(P) === 0) {
          var real = k.slice(P.length);
          if (!prefix || real.indexOf(prefix) === 0) keys.push(real);
        }
      }
      return { keys: keys, prefix: prefix, shared: false };
    },
  };

  /* 2) KI-Aufrufe: Die Apps rufen die Anthropic-API auf. Der Shim haengt den
        eigenen Key an - ODER leitet auf Google Gemini um (Gratis-Kontingent),
        wenn ein Gemini-Key (AIza...) hinterlegt ist. Key bleibt lokal. */
  var _fetch = (window.fetch || function () { return Promise.reject(new Error("no fetch")); }).bind(window);

  function getKey() {
    var key = localStorage.getItem("anthropic_key") || "";
    if (!key) {
      key = (window.prompt(
        "KI-Funktion: API-Key eingeben.\n\n" +
        "\u2022 Google Gemini: GRATIS-Kontingent, Key auf aistudio.google.com\n" +
        "\u2022 Anthropic (beginnt mit sk-ant-...): bezahlt, console.anthropic.com\n\n" +
        "Der Key wird nur lokal auf diesem Geraet gespeichert:"
      ) || "").trim();
      if (key) localStorage.setItem("anthropic_key", key);
    }
    return key;
  }
  function clearOnAuthFail(res) {
    if (res && (res.status === 401 || res.status === 403)) {
      localStorage.removeItem("anthropic_key");
    }
    return res;
  }

  function geminiBridge(key, opts) {
    var body;
    try { body = JSON.parse((opts && opts.body) || "{}"); } catch (e) { body = {}; }
    var contents = (body.messages || []).map(function (m) {
      var t = typeof m.content === "string" ? m.content
        : (m.content || []).map(function (p) { return p.text || ""; }).join("\n");
      return { role: m.role === "assistant" ? "model" : "user", parts: [{ text: t }] };
    });
    var gbody = { contents: contents, generationConfig: { maxOutputTokens: body.max_tokens || 1024 } };
    if (body.system) gbody.system_instruction = { parts: [{ text: String(body.system) }] };
    var models = ["gemini-flash-latest", "gemini-3-flash", "gemini-2.5-flash"];
    function tryModel(i) {
      if (i >= models.length) return Promise.reject(new Error("Gemini: kein Modell erreichbar"));
      return _fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/" + models[i] + ":generateContent",
        { method: "POST", headers: { "Content-Type": "application/json", "x-goog-api-key": key }, body: JSON.stringify(gbody) }
      ).then(function (res) {
        if (res.status === 404) return tryModel(i + 1);
        clearOnAuthFail(res);
        if (!res.ok) return res; /* App zeigt "API-Fehler <status>" */
        return res.json().then(function (d) {
          var parts = (((d.candidates || [])[0] || {}).content || {}).parts || [];
          var shape = {
            role: "assistant", model: models[i],
            content: parts.map(function (p) { return { type: "text", text: p.text || "" }; })
          };
          return new Response(JSON.stringify(shape), { status: 200, headers: { "Content-Type": "application/json" } });
        });
      });
    }
    return tryModel(0);
  }

  window.fetch = function (url, opts) {
    try {
      var u = typeof url === "string" ? url : (url && url.url) || "";
      if (u.indexOf("https://api.anthropic.com") === 0) {
        var key = getKey();
        if (key && key.indexOf("sk-ant-") !== 0) return geminiBridge(key, opts);
        opts = opts || {};
        var h = new Headers(opts.headers || {});
        if (key) h.set("x-api-key", key);
        if (!h.has("anthropic-version")) h.set("anthropic-version", "2023-06-01");
        h.set("anthropic-dangerous-direct-browser-access", "true");
        opts.headers = h;
        return _fetch(url, opts).then(clearOnAuthFail);
      }
    } catch (e) { /* im Zweifel Original-Fetch */ }
    return _fetch(url, opts);
  };

  /* 3) Service Worker für Offline-Betrieb */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }

  /* 4) Backup fuer alle Apps: kleines Symbol unten rechts.
        Export = JSON-Datei (landet in Dateien/iCloud), Import = wiederherstellen.
        Oranger Punkt = letztes Backup aelter als 30 Tage. */
  function backupUI() {
    var P2 = "artifact-storage:";
    function appName() {
      var p = location.pathname.replace(/\/+$/, "").split("/");
      return p[p.length - 1] || "app";
    }
    function dataKeys() {
      var ks = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf(P2) === 0) ks.push(k);
      }
      return ks;
    }
    var btn = document.createElement("button");
    btn.setAttribute("aria-label", "Backup");
    btn.innerHTML = "&#9111;"; /* ⎗ */
    btn.style.cssText = "position:fixed;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:99999;" +
      "width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,0,0,.25);background:rgba(255,255,255,.75);" +
      "color:#333;font-size:16px;line-height:1;opacity:.55;cursor:pointer;backdrop-filter:blur(4px);padding:0";
    var dot = document.createElement("span");
    dot.style.cssText = "position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:#D97E2B;display:none";
    btn.appendChild(dot);
    function refreshDot() {
      var last = +localStorage.getItem("backup_last_export") || 0;
      var stale = dataKeys().length > 0 && (Date.now() - last) > 30 * 86400000;
      dot.style.display = stale ? "block" : "none";
    }
    var menu = null;
    function closeMenu() { if (menu) { menu.remove(); menu = null; } }
    btn.addEventListener("click", function () {
      if (menu) { closeMenu(); return; }
      menu = document.createElement("div");
      menu.style.cssText = "position:fixed;right:10px;bottom:calc(52px + env(safe-area-inset-bottom));z-index:99999;" +
        "background:#fff;border:1px solid rgba(0,0,0,.2);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);" +
        "font:14px -apple-system,sans-serif;overflow:hidden";
      function item(label, fn) {
        var d = document.createElement("button");
        d.textContent = label;
        d.style.cssText = "display:block;width:100%;text-align:left;background:none;border:none;" +
          "border-bottom:1px solid rgba(0,0,0,.08);padding:11px 14px;font:inherit;color:#222;cursor:pointer";
        d.addEventListener("click", function () { closeMenu(); fn(); });
        menu.appendChild(d);
      }
      item("Backup exportieren", function () {
        var ks = dataKeys();
        if (!ks.length) { alert("Noch keine Daten zum Sichern."); return; }
        var data = {};
        ks.forEach(function (k) { data[k.slice(P2.length)] = localStorage.getItem(k); });
        var blob = new Blob([JSON.stringify({ app: appName(), exported: new Date().toISOString(), data: data }, null, 2)],
          { type: "application/json" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = appName() + "-backup-" + new Date().toISOString().slice(0, 10) + ".json";
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
        localStorage.setItem("backup_last_export", String(Date.now()));
        refreshDot();
      });
      item("Backup importieren", function () {
        var inp = document.createElement("input");
        inp.type = "file"; inp.accept = "application/json";
        inp.addEventListener("change", function () {
          var f = inp.files && inp.files[0];
          if (!f) return;
          var r = new FileReader();
          r.onload = function () {
            try {
              var d = JSON.parse(r.result);
              if (!d || typeof d.data !== "object") throw new Error();
              if (!confirm("Backup vom " + (d.exported || "?").slice(0, 10) + " einspielen? Aktuelle Daten dieser App werden ersetzt.")) return;
              Object.keys(d.data).forEach(function (k) { localStorage.setItem(P2 + k, d.data[k]); });
              location.reload();
            } catch (e) { alert("Import fehlgeschlagen \u2013 keine g\u00fcltige Backup-Datei."); }
          };
          r.readAsText(f);
        });
        inp.click();
      });
      document.body.appendChild(menu);
    });
    document.addEventListener("click", function (ev) {
      if (menu && ev.target !== btn && !menu.contains(ev.target) && !btn.contains(ev.target)) closeMenu();
    });
    document.body.appendChild(btn);
    refreshDot();
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", backupUI);
  else backupUI();

})();
</script>

@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Instrument+Sans:wght@400;500;600&display=swap');

:root {
  --tile: #F2F8F8;
  --card: #FFFFFF;
  --ink: #14333B;
  --muted: #5E7A81;
  --line: #DBEAEA;
  --accent: #0E7C86;
  --a: #E2654E;
  --a-soft: #FCEAE5;
  --b: #3E7CB1;
  --b-soft: #E7F0F8;
  --gold: #E8A93C;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

.bb-root {
  min-height: 100vh;
  background: var(--tile);
  background-image: radial-gradient(var(--line) 1px, transparent 1px);
  background-size: 26px 26px;
  color: var(--ink);
  font-family: 'Instrument Sans', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.45;
}

.bb-frame {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 18px 16px 86px;
  display: flex;
  flex-direction: column;
}

.bb-wordmark {
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
}
.bb-wordmark-big { font-size: 34px; text-align: center; }
.bb-spark { color: var(--gold); margin-left: 2px; }

.bb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.bb-legend {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--muted);
  font-weight: 500;
}
.bb-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.bb-dot-a { background: var(--a); margin-left: 8px; }
.bb-dot-b { background: var(--b); margin-left: 8px; }
.bb-legend .bb-dot-a:first-child { margin-left: 0; }

.bb-banner {
  background: #FBE9E7;
  color: #9C3B2A;
  border: 1px solid #F0C4BC;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 13px;
  margin-bottom: 12px;
}

.bb-main { flex: 1; }

.bb-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}
.bb-card-title {
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 12px;
}

/* Wochenkarte */
.bb-week-top { display: flex; justify-content: space-between; align-items: flex-end; }
.bb-kw {
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  font-weight: 800;
  font-size: 24px;
}
.bb-range { color: var(--muted); font-size: 13px; }
.bb-week-count {
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: var(--accent);
}
.bb-week-of { color: var(--muted); font-size: 17px; font-weight: 600; }

.bb-progress {
  margin-top: 12px;
  height: 12px;
  border-radius: 999px;
  background: var(--tile);
  border: 1px solid var(--line);
  overflow: visible;
  position: relative;
}
.bb-progress-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #5BB8C2, var(--accent));
  position: relative;
  transition: width .4s ease;
  min-width: 0;
}
.bb-bubble {
  position: absolute;
  right: -3px;
  top: -4px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff 0 25%, #BFE6EA 60%, var(--accent));
  border: 1px solid var(--accent);
}
.bb-all-done {
  margin-top: 12px;
  font-weight: 600;
  color: var(--accent);
  font-size: 14px;
}

/* Abschnitte */
.bb-section-title {
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  font-size: 15px;
  font-weight: 700;
  margin: 18px 0 8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.bb-section-done, .bb-section-later { color: var(--muted); }

/* Aufgabenzeilen */
.bb-row {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: opacity .3s ease, transform .3s ease;
}
.bb-row.is-checking { opacity: 0; transform: translateX(10px); }
.bb-row-tap { cursor: pointer; }
.bb-row-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.bb-row-name { font-weight: 600; }
.bb-freq { font-size: 12px; color: var(--muted); }
.bb-row-done { cursor: pointer; opacity: .75; }
.bb-row-done .bb-row-name { text-decoration: line-through; flex: 1; }
.bb-row-later { opacity: .55; padding: 9px 14px; }
.bb-row-later .bb-row-name { font-weight: 500; flex: 1; }

.bb-checkbox {
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 9px;
  border: 2px solid var(--line);
  background: var(--card);
  cursor: pointer;
  font-size: 15px;
  color: var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
}
.bb-checkbox:hover { border-color: var(--accent); }
.bb-checkbox.is-checked {
  border-color: var(--accent);
  background: var(--accent);
  color: #fff;
  cursor: pointer;
}
.bb-spark-pop { animation: bb-pop .35s ease; }
@keyframes bb-pop {
  0% { transform: scale(0); }
  60% { transform: scale(1.5); }
  100% { transform: scale(1); }
}
@media (prefers-reduced-motion: reduce) {
  .bb-spark-pop { animation: none; }
  .bb-row, .bb-progress-fill { transition: none; }
}

/* Personen-Chips */
.bb-chip {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 999px;
  white-space: nowrap;
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bb-chip-a { background: var(--a-soft); color: var(--a); }
.bb-chip-b { background: var(--b-soft); color: var(--b); }
.bb-chip-rot { background: var(--tile); color: var(--muted); border: 1px solid var(--line); }

/* Wechsel-Pill (Signatur) */
.bb-pill {
  display: flex;
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
  cursor: pointer;
  background: var(--tile);
  padding: 0;
}
.bb-pill-half {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 8px;
  color: var(--muted);
  font-family: 'Instrument Sans', system-ui, sans-serif;
}
.bb-pill-half.is-on { color: #fff; }
.bb-bg-a { background: var(--a); }
.bb-bg-b { background: var(--b); }
.bb-text-a { color: var(--a); }
.bb-text-b { color: var(--b); }

/* Formulare */
.bb-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  margin: 12px 0 6px;
}
.bb-input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 11px 12px;
  font-size: 15px;
  font-family: inherit;
  color: var(--ink);
  background: var(--card);
  margin-bottom: 8px;
}
.bb-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }

.bb-seg { display: flex; gap: 6px; flex-wrap: wrap; }
.bb-seg-btn {
  border: 1px solid var(--line);
  background: var(--card);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  color: var(--muted);
  cursor: pointer;
}
.bb-seg-btn.is-active { background: var(--ink); border-color: var(--ink); color: #fff; }
.bb-seg-a.is-active { background: var(--a); border-color: var(--a); }
.bb-seg-b.is-active { background: var(--b); border-color: var(--b); }

.bb-btn-primary {
  width: 100%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  font-weight: 700;
  font-size: 15px;
  border-radius: 12px;
  padding: 13px;
  cursor: pointer;
}
.bb-btn-primary:disabled { opacity: .45; cursor: default; }
.bb-btn-primary:not(:disabled):hover { filter: brightness(1.06); }

.bb-form-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.bb-form-actions .bb-btn-primary { width: auto; flex: 1; }
.bb-btn-ghost {
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--muted);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
}
.bb-btn-del { color: #9C3B2A; }
.bb-btn-danger {
  border: none;
  background: #C0492F;
  color: #fff;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
}

/* Bilanz */
.bb-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bb-bar-name { width: 84px; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bb-bar-track { flex: 1; height: 14px; background: var(--tile); border-radius: 999px; border: 1px solid var(--line); overflow: hidden; }
.bb-bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }
.bb-bar-num { width: 24px; text-align: right; font-weight: 700; font-family: 'Bricolage Grotesque', system-ui, sans-serif; }
.bb-fairness { margin-top: 6px; font-size: 13px; color: var(--muted); font-weight: 500; }

.bb-totals { display: flex; gap: 24px; }
.bb-total-num {
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  font-weight: 800;
  font-size: 30px;
}
.bb-total-name { font-size: 13px; color: var(--muted); font-weight: 500; }

/* Navigation */
.bb-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--line);
}
.bb-nav-btn {
  border: none;
  background: none;
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--muted);
  padding: 9px 18px;
  border-radius: 999px;
  cursor: pointer;
}
.bb-nav-btn.is-active { background: var(--ink); color: #fff; }

/* Sonstiges */
.bb-center { text-align: center; padding-top: 30vh; }
.bb-spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  margin: 0 auto 12px;
  animation: bb-spin .8s linear infinite;
}
@keyframes bb-spin { to { transform: rotate(360deg); } }
.bb-muted { color: var(--muted); }
.bb-empty { color: var(--muted); font-size: 14px; margin: 10px 0; }
.bb-empty-small { margin: 4px 0 10px; font-size: 13px; }
.bb-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Onboarding */
.bb-onboard { padding-top: 9vh; max-width: 340px; margin: 0 auto; width: 100%; }
.bb-onboard-sub {
  text-align: center;
  color: var(--muted);
  margin: 10px 0 22px;
  font-size: 14px;
}
.bb-check-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 13px;
  color: var(--muted);
  margin: 10px 0 18px;
  cursor: pointer;
}
.bb-check-row input { margin-top: 2px; accent-color: var(--accent); }
.bb-room {
  display: inline-block; padding: 1px 7px; margin-right: 6px; border-radius: 99px;
  background: var(--accent-soft, #E3F1EF); color: var(--accent, #2A7D74);
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em;
}
.bb-roomhead {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--accent, #2A7D74); margin: 18px 2px 8px;
}
.bb-week-pts { display: flex; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
.bb-blitz-toggle {
  margin-left: auto; border: 1.5px dashed var(--accent, #2A7D74); background: none;
  color: var(--accent, #2A7D74); border-radius: 99px; padding: 4px 12px;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.bb-blitz {
  margin-top: 12px; padding: 12px 14px; border-radius: 12px;
  background: var(--accent-soft, #E3F1EF); font-size: 13.5px; line-height: 1.5;
}
.bb-blitz-title { font-weight: 700; margin-bottom: 6px; }
.bb-blitz-row { display: flex; align-items: baseline; gap: 6px; margin: 3px 0; }
