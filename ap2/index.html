<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AP2-Lernsystem</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AP2">
<meta name="theme-color" content="#1F2A3A">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>html,body{margin:0;padding:0;background:#FAFAF7}body{padding-top:env(safe-area-inset-top)}#root{min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script>/* PWA-Shim: macht die Original-Artifact-Apps auf GitHub Pages lauffähig */
(function () {
  "use strict";
  /* 1) window.storage (Artifact-API) -> localStorage */
  var P = "artifact-storage:";
  window.storage = {
    get: async function (key) {
      var v = localStorage.getItem(P + key);
      if (v === null) return null;
      return { key: key, value: v, shared: false };
    },
    set: async function (key, value) {
      localStorage.setItem(P + key, String(value));
      return { key: key, value: String(value), shared: false };
    },
    delete: async function (key) {
      localStorage.removeItem(P + key);
      return { key: key, deleted: true, shared: false };
    },
    list: async function (prefix) {
      var keys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf(P) === 0) {
          var real = k.slice(P.length);
          if (!prefix || real.indexOf(prefix) === 0) keys.push(real);
        }
      }
      return { keys: keys, prefix: prefix, shared: false };
    },
  };

  /* 2) KI-Aufrufe: Die Apps rufen die Anthropic-API auf. Der Shim haengt den
        eigenen Key an - ODER leitet auf Google Gemini um (Gratis-Kontingent),
        wenn ein Gemini-Key (AIza...) hinterlegt ist. Key bleibt lokal. */
  var _fetch = (window.fetch || function () { return Promise.reject(new Error("no fetch")); }).bind(window);

  function getKey() {
    var key = localStorage.getItem("anthropic_key") || "";
    if (!key) {
      key = (window.prompt(
        "KI-Funktion: API-Key eingeben.\n\n" +
        "\u2022 Google Gemini (AIza...): GRATIS-Kontingent, Key auf aistudio.google.com\n" +
        "\u2022 Anthropic (sk-ant-...): bezahlt, Key auf console.anthropic.com\n\n" +
        "Der Key wird nur lokal auf diesem Geraet gespeichert:"
      ) || "").trim();
      if (key) localStorage.setItem("anthropic_key", key);
    }
    return key;
  }
  function clearOnAuthFail(res) {
    if (res && (res.status === 401 || res.status === 403)) {
      localStorage.removeItem("anthropic_key");
    }
    return res;
  }

  function geminiBridge(key, opts) {
    var body;
    try { body = JSON.parse((opts && opts.body) || "{}"); } catch (e) { body = {}; }
    var contents = (body.messages || []).map(function (m) {
      var t = typeof m.content === "string" ? m.content
        : (m.content || []).map(function (p) { return p.text || ""; }).join("\n");
      return { role: m.role === "assistant" ? "model" : "user", parts: [{ text: t }] };
    });
    var gbody = { contents: contents, generationConfig: { maxOutputTokens: body.max_tokens || 1024 } };
    if (body.system) gbody.system_instruction = { parts: [{ text: String(body.system) }] };
    var models = ["gemini-flash-latest", "gemini-3-flash", "gemini-2.5-flash"];
    function tryModel(i) {
      if (i >= models.length) return Promise.reject(new Error("Gemini: kein Modell erreichbar"));
      return _fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/" + models[i] +
        ":generateContent?key=" + encodeURIComponent(key),
        { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(gbody) }
      ).then(function (res) {
        if (res.status === 404) return tryModel(i + 1);
        clearOnAuthFail(res);
        if (!res.ok) return res; /* App zeigt "API-Fehler <status>" */
        return res.json().then(function (d) {
          var parts = (((d.candidates || [])[0] || {}).content || {}).parts || [];
          var shape = {
            role: "assistant", model: models[i],
            content: parts.map(function (p) { return { type: "text", text: p.text || "" }; })
          };
          return new Response(JSON.stringify(shape), { status: 200, headers: { "Content-Type": "application/json" } });
        });
      });
    }
    return tryModel(0);
  }

  window.fetch = function (url, opts) {
    try {
      var u = typeof url === "string" ? url : (url && url.url) || "";
      if (u.indexOf("https://api.anthropic.com") === 0) {
        var key = getKey();
        if (key.indexOf("AIza") === 0) return geminiBridge(key, opts);
        opts = opts || {};
        var h = new Headers(opts.headers || {});
        if (key) h.set("x-api-key", key);
        if (!h.has("anthropic-version")) h.set("anthropic-version", "2023-06-01");
        h.set("anthropic-dangerous-direct-browser-access", "true");
        opts.headers = h;
        return _fetch(url, opts).then(clearOnAuthFail);
      }
    } catch (e) { /* im Zweifel Original-Fetch */ }
    return _fetch(url, opts);
  };

  /* 3) Service Worker für Offline-Betrieb */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }

  /* 4) Backup fuer alle Apps: kleines Symbol unten rechts.
        Export = JSON-Datei (landet in Dateien/iCloud), Import = wiederherstellen.
        Oranger Punkt = letztes Backup aelter als 30 Tage. */
  function backupUI() {
    var P2 = "artifact-storage:";
    function appName() {
      var p = location.pathname.replace(/\/+$/, "").split("/");
      return p[p.length - 1] || "app";
    }
    function dataKeys() {
      var ks = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf(P2) === 0) ks.push(k);
      }
      return ks;
    }
    var btn = document.createElement("button");
    btn.setAttribute("aria-label", "Backup");
    btn.innerHTML = "&#9111;"; /* ⎗ */
    btn.style.cssText = "position:fixed;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:99999;" +
      "width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,0,0,.25);background:rgba(255,255,255,.75);" +
      "color:#333;font-size:16px;line-height:1;opacity:.55;cursor:pointer;backdrop-filter:blur(4px);padding:0";
    var dot = document.createElement("span");
    dot.style.cssText = "position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:#D97E2B;display:none";
    btn.appendChild(dot);
    function refreshDot() {
      var last = +localStorage.getItem("backup_last_export") || 0;
      var stale = dataKeys().length > 0 && (Date.now() - last) > 30 * 86400000;
      dot.style.display = stale ? "block" : "none";
    }
    var menu = null;
    function closeMenu() { if (menu) { menu.remove(); menu = null; } }
    btn.addEventListener("click", function () {
      if (menu) { closeMenu(); return; }
      menu = document.createElement("div");
      menu.style.cssText = "position:fixed;right:10px;bottom:calc(52px + env(safe-area-inset-bottom));z-index:99999;" +
        "background:#fff;border:1px solid rgba(0,0,0,.2);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);" +
        "font:14px -apple-system,sans-serif;overflow:hidden";
      function item(label, fn) {
        var d = document.createElement("button");
        d.textContent = label;
        d.style.cssText = "display:block;width:100%;text-align:left;background:none;border:none;" +
          "border-bottom:1px solid rgba(0,0,0,.08);padding:11px 14px;font:inherit;color:#222;cursor:pointer";
        d.addEventListener("click", function () { closeMenu(); fn(); });
        menu.appendChild(d);
      }
      item("Backup exportieren", function () {
        var ks = dataKeys();
        if (!ks.length) { alert("Noch keine Daten zum Sichern."); return; }
        var data = {};
        ks.forEach(function (k) { data[k.slice(P2.length)] = localStorage.getItem(k); });
        var blob = new Blob([JSON.stringify({ app: appName(), exported: new Date().toISOString(), data: data }, null, 2)],
          { type: "application/json" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = appName() + "-backup-" + new Date().toISOString().slice(0, 10) + ".json";
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
        localStorage.setItem("backup_last_export", String(Date.now()));
        refreshDot();
      });
      item("Backup importieren", function () {
        var inp = document.createElement("input");
        inp.type = "file"; inp.accept = "application/json";
        inp.addEventListener("change", function () {
          var f = inp.files && inp.files[0];
          if (!f) return;
          var r = new FileReader();
          r.onload = function () {
            try {
              var d = JSON.parse(r.result);
              if (!d || typeof d.data !== "object") throw new Error();
              if (!confirm("Backup vom " + (d.exported || "?").slice(0, 10) + " einspielen? Aktuelle Daten dieser App werden ersetzt.")) return;
              Object.keys(d.data).forEach(function (k) { localStorage.setItem(P2 + k, d.data[k]); });
              location.reload();
            } catch (e) { alert("Import fehlgeschlagen \u2013 keine g\u00fcltige Backup-Datei."); }
          };
          r.readAsText(f);
        });
        inp.click();
      });
      document.body.appendChild(menu);
    });
    document.addEventListener("click", function (ev) {
      if (menu && ev.target !== btn && !menu.contains(ev.target) && !btn.contains(ev.target)) closeMenu();
    });
    document.body.appendChild(btn);
    refreshDot();
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", backupUI);
  else backupUI();

})();
</script>

Router: Layer 3, leitet Pakete anhand von IP-Adressen zwischen verschiedenen Netzen weiter (Routing-Tabelle).`},{id:"n07",topic:"net",type:"mc",q:"Welche Aufgabe hat das Spanning Tree Protocol (STP)?",options:["Lastverteilung zwischen Routern","Verhindert Schleifen (Loops) in geswitchten Netzen","Verschl\xFCsselt VLAN-Traffic","Priorisiert VoIP-Pakete"],correct:1,expl:"STP deaktiviert redundante Pfade logisch, um Broadcast-St\xFCrme durch Layer-2-Loops zu verhindern. Redundanz bleibt als Fallback erhalten."},{id:"n08",topic:"net",type:"mc",q:"Mit welchem Standard werden VLANs auf einem Trunk-Port markiert (getaggt)?",options:["802.1X","802.11ac","802.1Q","802.3ad"],correct:2,expl:"802.1Q f\xFCgt dem Ethernet-Frame ein VLAN-Tag hinzu. 802.1X = Port-Authentifizierung, 802.3ad = Link Aggregation."},{id:"n09",topic:"net",type:"open",q:"Wozu dient das Default Gateway auf einem Client?",a:"Es ist die IP-Adresse des Routers, an den der Client alle Pakete schickt, deren Ziel au\xDFerhalb des eigenen Subnetzes liegt. Ohne Default Gateway ist nur Kommunikation im lokalen Netz m\xF6glich."},{id:"n10",topic:"net",type:"mc",q:"Wie lange dauert die \xDCbertragung von 500 MB \xFCber eine 100-Mbit/s-Leitung (ohne Overhead)?",options:["5 s","40 s","50 s","400 s"],correct:1,expl:"500 MB \xD7 8 = 4000 Mbit. 4000 Mbit \xF7 100 Mbit/s = 40 s. Klassische IHK-Falle: Byte vs. Bit!"},{id:"n11",topic:"net",type:"open",q:"Unterschied TCP vs. UDP \u2014 nenne je zwei Eigenschaften und ein Protokollbeispiel.",a:`TCP: verbindungsorientiert (3-Way-Handshake), zuverl\xE4ssig (Best\xE4tigung, Neu\xFCbertragung), Reihenfolge garantiert. Beispiele: HTTPS, SMTP.
UDP: verbindungslos, kein Overhead durch Best\xE4tigungen, schneller, keine Garantien. Beispiele: DNS, VoIP/RTP.`},{id:"n12",topic:"net",type:"mc",q:"Welcher Standardport geh\xF6rt zu RDP?",options:["443","3389","445","1433"],correct:1,expl:"RDP = 3389. Zum Merken: 443 HTTPS, 445 SMB, 1433 MS SQL."},{id:"n13",topic:"net",type:"mc",q:"Auf welcher OSI-Schicht arbeitet das Internet Protocol (IP)?",options:["Schicht 2 \u2013 Sicherung","Schicht 3 \u2013 Vermittlung","Schicht 4 \u2013 Transport","Schicht 7 \u2013 Anwendung"],correct:1,expl:"IP = Schicht 3 (Vermittlungsschicht / Network Layer). TCP/UDP = Schicht 4."},{id:"s01",topic:"svc",type:"open",q:"Beschreibe den DHCP-Ablauf (DORA) in vier Schritten.",a:`1. Discover \u2014 Client sucht per Broadcast einen DHCP-Server.
2. Offer \u2014 Server bietet eine IP-Konfiguration an.
3. Request \u2014 Client fordert das Angebot verbindlich an.
4. Acknowledge \u2014 Server best\xE4tigt die Zuweisung (Lease).`},{id:"s02",topic:"svc",type:"open",q:"Erkl\xE4re den Unterschied zwischen A-, CNAME- und MX-Record im DNS.",a:`A-Record: Name \u2192 IPv4-Adresse (AAAA f\xFCr IPv6).
CNAME: Alias, verweist auf einen anderen Namen.
MX: definiert den zust\xE4ndigen Mailserver einer Domain (mit Priorit\xE4t).`},{id:"s03",topic:"svc",type:"mc",q:"Wozu dient ein PTR-Record?",options:["Weiterleitung von Mails","Reverse Lookup: IP-Adresse \u2192 Hostname","Lastverteilung im DNS","Signierung von DNS-Antworten"],correct:1,expl:"PTR-Records erm\xF6glichen die R\xFCckw\xE4rtsaufl\xF6sung (Reverse DNS), wichtig z. B. f\xFCr Mailserver-Reputation."},{id:"s04",topic:"svc",type:"open",q:"Unterschied NAT vs. PAT?",a:`NAT: \xDCbersetzung von IP-Adressen (z. B. 1:1 privat \u2194 \xF6ffentlich).
PAT (NAT-Overload): viele private IPs teilen sich eine \xF6ffentliche Adresse, Unterscheidung \xFCber Portnummern \u2014 der Normalfall in Heim- und Firmennetzen.`},{id:"s05",topic:"svc",type:"mc",q:"Wozu dient ein DHCP-Relay-Agent (IP-Helper)?",options:["Verl\xE4ngert DHCP-Leases automatisch","Leitet DHCP-Broadcasts in andere Subnetze an den zentralen DHCP-Server weiter","Verteilt DNS-Einstellungen per Multicast","Sch\xFCtzt vor Rogue-DHCP-Servern"],correct:1,expl:"DHCP arbeitet mit Broadcasts, die Router nicht weiterleiten. Der Relay-Agent wandelt sie in Unicasts an den zentralen Server um \u2014 so reicht ein DHCP-Server f\xFCr viele VLANs."},{id:"s06",topic:"svc",type:"open",q:"Was ist der Unterschied zwischen DNS-Weiterleitung (Forwarder) und Root-Hints?",a:`Forwarder: der DNS-Server schickt alle nicht aufl\xF6sbaren Anfragen an einen definierten externen DNS-Server (z. B. den des Providers).
Root-Hints: der Server l\xF6st selbst iterativ auf, beginnend bei den Root-Servern. Forwarder = weniger Aufwand, Root-Hints = unabh\xE4ngiger.`},{id:"x01",topic:"sec",type:"open",q:"Nenne und erkl\xE4re die drei Schutzziele der Informationssicherheit (CIA).",a:`Vertraulichkeit (Confidentiality): nur Berechtigte haben Zugriff.
Integrit\xE4t (Integrity): Daten sind unver\xE4ndert und korrekt.
Verf\xFCgbarkeit (Availability): Systeme und Daten sind nutzbar, wenn sie gebraucht werden.`},{id:"x02",topic:"sec",type:"open",q:"Symmetrische vs. asymmetrische Verschl\xFCsselung \u2014 Unterschied und je ein Beispiel.",a:`Symmetrisch: ein gemeinsamer Schl\xFCssel f\xFCr Ver- und Entschl\xFCsselung, schnell, Problem = Schl\xFCsselaustausch. Beispiel: AES.
Asymmetrisch: Schl\xFCsselpaar (\xF6ffentlich/privat), langsamer, l\xF6st das Austauschproblem. Beispiel: RSA.
Praxis: hybrid \u2014 asymmetrisch wird der symmetrische Sitzungsschl\xFCssel ausgetauscht (z. B. TLS).`},{id:"x03",topic:"sec",type:"open",q:"Was ist eine DMZ und wozu dient sie?",a:"Demilitarisierte Zone: ein durch Firewalls abgetrenntes Netzsegment zwischen Internet und LAN. Dort stehen von au\xDFen erreichbare Dienste (Webserver, Mail-Gateway). Wird ein DMZ-System kompromittiert, ist das interne Netz weiterhin gesch\xFCtzt."},{id:"x04",topic:"sec",type:"open",q:"Unterschied Phishing vs. Spear-Phishing \u2014 und nenne zwei technische Gegenma\xDFnahmen.",a:`Phishing: massenhafte, generische Betrugsmails.
Spear-Phishing: gezielter Angriff auf eine Person/Firma mit recherchierten Details, deutlich glaubw\xFCrdiger.
Gegenma\xDFnahmen: E-Mail-Filter/Gateway (z. B. mit SPF, DKIM, DMARC), MFA, Awareness-Schulungen und Phishing-Simulationen.`},{id:"x05",topic:"sec",type:"mc",q:"Welche drei Faktor-Kategorien gibt es bei Multi-Faktor-Authentifizierung?",options:["Passwort, PIN, TAN","Wissen, Besitz, Biometrie","Software, Hardware, Cloud","Benutzername, Passwort, Captcha"],correct:1,expl:"Wissen (Passwort/PIN), Besitz (Token, Smartphone), Inh\xE4renz/Biometrie (Fingerabdruck, Gesicht). MFA = mindestens zwei verschiedene Kategorien."},{id:"x06",topic:"sec",type:"open",q:"Was unterscheidet ein IDS von einem IPS?",a:`IDS (Intrusion Detection System): erkennt und meldet Angriffe, greift aber nicht ein (passiv).
IPS (Intrusion Prevention System): sitzt inline im Datenstrom und blockiert erkannte Angriffe aktiv.`},{id:"x07",topic:"sec",type:"open",q:"Unterschied Site-to-Site-VPN vs. Client-to-Site-VPN \u2014 je ein Einsatzszenario.",a:`Site-to-Site: dauerhafte, verschl\xFCsselte Verbindung zwischen zwei Standorten (Gateway \u2194 Gateway), z. B. Zentrale \u2194 Filiale.
Client-to-Site: einzelner Mitarbeiter w\xE4hlt sich mit VPN-Client ins Firmennetz ein, z. B. Home-Office.`},{id:"x08",topic:"sec",type:"open",q:"Was ist Ransomware und was ist die wichtigste Schutzma\xDFnahme gegen Datenverlust dadurch?",a:`Schadsoftware, die Daten verschl\xFCsselt und L\xF6segeld fordert.
Wichtigste Ma\xDFnahme gegen Datenverlust: regelm\xE4\xDFige Backups nach 3-2-1-Regel, davon mindestens eine Kopie offline/unver\xE4nderlich (air-gapped/immutable), plus getestete Wiederherstellung.`},{id:"x09",topic:"sec",type:"open",q:"Nenne drei Gegenma\xDFnahmen gegen Brute-Force-Angriffe auf Logins.",a:"Konto-Sperrung/Lockout nach X Fehlversuchen, Verz\xF6gerung zwischen Versuchen (Rate Limiting), MFA, starke Passwortrichtlinien, Fail2ban/Geo-Blocking, Monitoring der Anmeldeprotokolle."},{id:"x10",topic:"sec",type:"open",q:"Wozu dienen Zertifikate bei TLS/HTTPS?",a:"Sie binden einen \xF6ffentlichen Schl\xFCssel an eine Identit\xE4t (Domain), best\xE4tigt durch eine vertrauensw\xFCrdige Zertifizierungsstelle (CA). Der Client pr\xFCft damit, dass er wirklich mit dem echten Server spricht (Authentizit\xE4t) \u2014 Grundlage f\xFCr den verschl\xFCsselten Sitzungsaufbau."},{id:"x11",topic:"sec",type:"open",q:"Was ist DNS-Tunneling und wie kann man es erkennen?",a:`Missbrauch des DNS-Protokolls, um Daten (C2-Traffic, Exfiltration) in DNS-Anfragen/-Antworten zu verstecken \u2014 DNS ist in Firewalls fast immer erlaubt.
Erkennung: ungew\xF6hnlich viele/lange DNS-Anfragen, hohe Entropie in Subdomains, auff\xE4llige TXT-Record-Nutzung, DNS-Monitoring/Anomalieerkennung.`},{id:"r01",topic:"srv",type:"mc",q:"Ein RAID 5 aus vier 4-TB-Platten bietet wie viel nutzbare Kapazit\xE4t?",options:["4 TB","8 TB","12 TB","16 TB"],correct:2,expl:"RAID 5: (n\u22121) \xD7 Kapazit\xE4t = 3 \xD7 4 TB = 12 TB. Eine Platte geht f\xFCr Parit\xE4t 'verloren'."},{id:"r02",topic:"srv",type:"mc",q:"Wie viele Festplatten ben\xF6tigt ein RAID 10 mindestens?",options:["2","3","4","6"],correct:2,expl:"RAID 10 = Stripe \xFCber gespiegelte Paare \u2192 mindestens 2 \xD7 2 = 4 Platten. Nutzkapazit\xE4t = 50 %."},{id:"r03",topic:"srv",type:"open",q:"Erkl\xE4re die 3-2-1-Backup-Regel.",a:`3 Kopien der Daten (Original + 2 Backups),
auf 2 verschiedenen Medientypen,
davon 1 Kopie extern/offsite (r\xE4umlich getrennt, idealerweise offline oder unver\xE4nderlich).`},{id:"r04",topic:"srv",type:"open",q:"Vollbackup vs. differenziell vs. inkrementell \u2014 Unterschied und Restore-Aufwand.",a:`Voll: alles wird gesichert. Restore: 1 Backup n\xF6tig.
Differenziell: alles seit dem letzten Vollbackup. Restore: Voll + letztes Differenzial (2 S\xE4tze).
Inkrementell: alles seit der letzten Sicherung (egal welcher Art). Restore: Voll + ALLE Inkremente in Reihenfolge \u2014 kleinste Backups, aufwendigster Restore.`},{id:"r05",topic:"srv",type:"open",q:"Typ-1- vs. Typ-2-Hypervisor \u2014 Unterschied und je ein Beispiel.",a:`Typ 1 (bare metal): l\xE4uft direkt auf der Hardware, f\xFCr Produktivbetrieb. Beispiele: VMware ESXi, Hyper-V, Proxmox.
Typ 2 (hosted): l\xE4uft als Anwendung auf einem Betriebssystem, f\xFCr Test/Desktop. Beispiele: VirtualBox, VMware Workstation.`},{id:"r06",topic:"srv",type:"open",q:"Warum ist ein Snapshot kein Backup?",a:"Ein Snapshot speichert nur \xC4nderungen relativ zu einem Basiszustand und liegt auf demselben Storage wie die VM. F\xE4llt der Storage aus oder wird er verschl\xFCsselt, ist der Snapshot mit weg. Backups sind unabh\xE4ngige, vollst\xE4ndige Kopien auf getrennter Infrastruktur. Snapshots sind zudem nicht f\xFCr lange Aufbewahrung gedacht (Performance)."},{id:"r07",topic:"srv",type:"open",q:"Unterschied Online-USV (VFI) vs. Offline-USV (VFD)?",a:`Online/VFI (Doppelwandler): Verbraucher h\xE4ngen permanent hinter Gleichrichter+Wechselrichter \u2014 keine Umschaltzeit, sauberer Strom, f\xFCr Server/RZ.
Offline/VFD (Standby): Netzstrom geht direkt durch, bei Ausfall wird auf Batterie umgeschaltet (kurze Umschaltzeit) \u2014 g\xFCnstig, f\xFCr unkritische Ger\xE4te.`},{id:"r08",topic:"srv",type:"mc",q:"Ein Server ben\xF6tigt 800 W. Das Netzteil hat 92 % Wirkungsgrad. Welche Leistung wird aus dem Netz aufgenommen?",options:["736 W","800 W","\u2248 870 W","920 W"],correct:2,expl:"Aufnahme = Abgabe \xF7 Wirkungsgrad = 800 \xF7 0,92 \u2248 869,6 W. Der Rest wird als W\xE4rme abgegeben."},{id:"r09",topic:"srv",type:"open",q:"Erkl\xE4re RPO und RTO.",a:`RPO (Recovery Point Objective): maximal tolerierter Datenverlust in Zeit \u2014 'wie alt darf das letzte Backup sein?'
RTO (Recovery Time Objective): maximal tolerierte Ausfallzeit bis zur Wiederherstellung \u2014 'wie schnell muss das System wieder laufen?'`},{id:"r10",topic:"srv",type:"mc",q:"Was ist ein Hot Spare?",options:["Ein manuell einzubauendes Ersatzteil im Lager","Eine Reserveplatte im laufenden System, die bei Ausfall automatisch einspringt","Ein zweites, redundantes Netzteil","Ein gespiegelter Server am zweiten Standort"],correct:1,expl:"Hot Spare = eingebaute, inaktive Reserveplatte; das RAID rebuildet automatisch darauf. Cold Spare = Ersatz im Schrank, manueller Einbau."},{id:"w01",topic:"win",type:"open",q:"Was ist eine GPO und in welcher Reihenfolge werden Gruppenrichtlinien verarbeitet?",a:`Group Policy Object: zentrale Konfiguration von Benutzer- und Computereinstellungen im AD.
Verarbeitungsreihenfolge: LSDOU \u2014 Local, Site, Domain, OU (verschachtelte OUs zuletzt). Sp\xE4ter verarbeitete Richtlinien gewinnen bei Konflikten.`},{id:"w02",topic:"win",type:"open",q:"Unterscheide im Active Directory: Dom\xE4ne, Organisationseinheit (OU) und Gruppe.",a:`Dom\xE4ne: administrative Sicherheitsgrenze mit eigener Datenbank und Authentifizierung.
OU: Container zur Strukturierung von Objekten \u2014 Ziel f\xFCr GPOs und Delegierung.
Gruppe: Sicherheitsprinzipal zur Rechtevergabe (Berechtigungen werden Gruppen zugewiesen, nicht OUs).`},{id:"w03",topic:"win",type:"mc",q:"Wie viele FSMO-Rollen gibt es in einer AD-Gesamtstruktur?",options:["3","4","5","7"],correct:2,expl:"5 Rollen: Schema Master, Domain Naming Master (forestweit), PDC-Emulator, RID Master, Infrastructure Master (dom\xE4nenweit)."},{id:"w04",topic:"win",type:"open",q:"Erkl\xE4re das AGDLP-Prinzip.",a:`Accounts \u2192 Globale Gruppen \u2192 Dom\xE4nenlokale Gruppen \u2192 Permissions.
Benutzerkonten kommen in globale Gruppen (nach Rolle/Abteilung), diese in dom\xE4nenlokale Gruppen, und nur den dom\xE4nenlokalen Gruppen werden Berechtigungen auf Ressourcen erteilt. Vorteil: \xFCbersichtlich, skalierbar, revisionssicher.`},{id:"w05",topic:"win",type:"open",q:"Warum ist DNS f\xFCr Active Directory kritisch?",a:"Clients und DCs finden Dom\xE4nendienste (LDAP, Kerberos, GC) \xFCber SRV-Records im DNS. Ohne funktionierendes DNS: keine Anmeldung, keine GPO-Verarbeitung, keine Replikation. Deshalb zeigen Dom\xE4nenmitglieder als DNS-Server immer auf die internen DCs."},{id:"w06",topic:"win",type:"mc",q:"Welches Authentifizierungsprotokoll ist Standard im Active Directory?",options:["NTLM","Kerberos","RADIUS","TACACS+"],correct:1,expl:"Kerberos (Ticket-basiert, TGT vom KDC). NTLM ist der Legacy-Fallback und sollte minimiert werden."},{id:"c01",topic:"cld",type:"open",q:"Erkl\xE4re IaaS, PaaS und SaaS mit je einem Beispiel.",a:`IaaS: Infrastruktur (VMs, Netz, Storage) \u2014 Kunde verwaltet ab OS aufw\xE4rts. Beispiel: Azure Virtual Machines.
PaaS: Plattform f\xFCr Entwicklung/Betrieb, ohne OS-Verwaltung. Beispiel: Azure App Service.
SaaS: fertige Anwendung aus der Cloud. Beispiel: Microsoft 365 / Exchange Online.`},{id:"c02",topic:"cld",type:"open",q:"Was ist Conditional Access in Microsoft Entra ID und nenne zwei typische Bedingungen/Kontrollen.",a:`Richtlinienbasierte Zugriffssteuerung: Wenn-Dann-Regeln beim Sign-in.
Bedingungen: Benutzer/Gruppe, Standort/IP, Ger\xE4tezustand (compliant), App, Risiko-Level.
Kontrollen: MFA erzwingen, Zugriff blockieren, compliant Device verlangen, Sitzungsbeschr\xE4nkungen.
Wichtig: Ausschl\xFCsse und dynamische Gruppen regelm\xE4\xDFig pr\xFCfen \u2014 h\xE4ufige Sicherheitsl\xFCcke.`},{id:"c03",topic:"cld",type:"open",q:"Erkl\xE4re das Shared-Responsibility-Modell in der Cloud.",a:"Der Anbieter ist verantwortlich f\xFCr die Sicherheit DER Cloud (Rechenzentren, Hardware, Hypervisor), der Kunde f\xFCr die Sicherheit IN der Cloud (Daten, Identit\xE4ten, Berechtigungen, Konfiguration). Der Schnitt verschiebt sich je nach Modell: bei IaaS tr\xE4gt der Kunde am meisten, bei SaaS am wenigsten \u2014 aber Daten und Identit\xE4ten bleiben IMMER Kundenverantwortung (deshalb: M365-Backup!)."},{id:"c04",topic:"cld",type:"mc",q:"Ein Unternehmen betreibt eigene Server im RZ und nutzt zus\xE4tzlich Microsoft 365. Welches Cloud-Modell liegt vor?",options:["Public Cloud","Private Cloud","Hybrid Cloud","Community Cloud"],correct:2,expl:"Kombination aus eigener Infrastruktur (private) und Public-Cloud-Diensten = Hybrid Cloud. Der Standardfall im deutschen Mittelstand."},{id:"p01",topic:"pm",type:"mc",q:"Was kennzeichnet den kritischen Pfad in einem Netzplan?",options:["Der Weg mit den meisten Vorg\xE4ngen","Der Weg, auf dem alle Vorg\xE4nge einen Gesamtpuffer von 0 haben","Der teuerste Projektabschnitt","Der Weg mit den meisten Ressourcen"],correct:1,expl:"Kritischer Pfad = l\xE4ngster Weg durch den Netzplan = k\xFCrzeste Projektdauer. Verz\xF6gerung dort verz\xF6gert das ganze Projekt (Puffer = 0)."},{id:"p02",topic:"pm",type:"mc",q:"Wer erstellt Lastenheft und Pflichtenheft?",options:["Beide der Auftraggeber","Lastenheft: Auftragnehmer / Pflichtenheft: Auftraggeber","Lastenheft: Auftraggeber / Pflichtenheft: Auftragnehmer","Beide der Auftragnehmer"],correct:2,expl:"Lastenheft (WAS und WOF\xDCR) = Auftraggeber. Pflichtenheft (WIE und WOMIT wird es umgesetzt) = Auftragnehmer. Absoluter IHK-Klassiker."},{id:"p03",topic:"pm",type:"open",q:"Wof\xFCr stehen die SMART-Kriterien bei Projektzielen?",a:`Spezifisch \u2014 eindeutig formuliert.
Messbar \u2014 Erfolg quantifizierbar.
Attraktiv/Akzeptiert \u2014 motivierend, von Beteiligten getragen.
Realistisch \u2014 erreichbar.
Terminiert \u2014 mit klarem Endtermin.`},{id:"p04",topic:"pm",type:"open",q:"Wozu dient eine Nutzwertanalyse und wie l\xE4uft sie ab?",a:`Objektiver Vergleich mehrerer Alternativen (z. B. Angebote, Produkte) anhand gewichteter Kriterien.
Ablauf: Kriterien festlegen \u2192 gewichten (Summe 100 %) \u2192 jede Alternative pro Kriterium bewerten (Punkte) \u2192 Punkte \xD7 Gewichtung \u2192 Summe. H\xF6chster Nutzwert gewinnt. In der AP2 fast immer als Rechenaufgabe dabei.`},{id:"p05",topic:"pm",type:"mc",q:"Was zeigt ein Gantt-Diagramm?",options:["Kostenverlauf \xFCber die Projektlaufzeit","Vorg\xE4nge als Balken auf einer Zeitachse inkl. Dauer und \xDCberschneidungen","Hierarchie der Projektbeteiligten","Abh\xE4ngigkeiten als Knoten und Pfeile"],correct:1,expl:"Gantt = Balkendiagramm \xFCber Zeitachse. Abh\xE4ngigkeiten als Knoten/Pfeile = Netzplan."},{id:"p06",topic:"pm",type:"open",q:"Was geh\xF6rt in eine Ist-Analyse und was in ein Soll-Konzept?",a:`Ist-Analyse: objektive Aufnahme des aktuellen Zustands \u2014 vorhandene Hard-/Software, Prozesse, Probleme, Mengenger\xFCst.
Soll-Konzept: der angestrebte Zielzustand mit Anforderungen und L\xF6sungsansatz, abgeleitet aus den Schw\xE4chen der Ist-Analyse. Wichtig f\xFCrs Abschlussprojekt: sauber trennen, nicht vermischen.`},{id:"d01",topic:"dsg",type:"open",q:"Was sind personenbezogene Daten nach DSGVO? Nenne vier Beispiele.",a:`Alle Informationen, die sich auf eine identifizierte oder identifizierbare nat\xFCrliche Person beziehen (Art. 4 DSGVO).
Beispiele: Name, E-Mail-Adresse, IP-Adresse, Personalnummer, Standortdaten, Kfz-Kennzeichen, Gesundheitsdaten (besondere Kategorie).`},{id:"d02",topic:"dsg",type:"open",q:"Was sind TOM? Nenne je zwei technische und zwei organisatorische Ma\xDFnahmen.",a:`Technische und organisatorische Ma\xDFnahmen zum Schutz personenbezogener Daten (Art. 32 DSGVO).
